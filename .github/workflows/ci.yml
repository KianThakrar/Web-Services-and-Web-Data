name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migration smoke check
        env:
          DATABASE_URL: sqlite:///./ci_migrations.db
          DEBUG: "false"
        run: alembic upgrade head

      - name: Run tests
        env:
          DEBUG: "false"
        run: pytest -q
